# Fly config for the backend API (ADR-0030). One app per environment; the
# deploy workflow overrides the app name per env via `flyctl deploy --app
# balances-<env>`. Secrets (DATABASE_URL, GOOGLE_*, RESEND/SMTP_*, etc.) are set
# with `fly secrets set`, never committed here. Region sin = Singapore, closest
# to the Indonesia audience.
app = "balances-preview"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[deploy]
  # Runs in a one-off VM with the app's secrets before the new version goes live;
  # a failed migration blocks the rollout. The baseline migration is embedded in
  # the binary (go:embed), so no files are needed at runtime.
  release_command = "/app/balances migrate up"

[env]
  PORT = "8080"
  LOG_FORMAT = "json"
  # serve the SPA baked into the image (single-origin, ADR-0030)
  WEB_DIR = "/app/web"

[http_service]
  internal_port = 8080
  force_https = true
  # scale to zero when idle; cold-start on the next request
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
