<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>balances</title>
    <!--
      Apply the persisted theme before first paint so there is no light/dark
      flash. Precedence mirrors resolveBootTheme() in src/theme/index.ts: an
      explicit stored choice (balances.theme), then the OS preference, then dark
      (the app's historical default). Inline + synchronous so it runs ahead of
      any rendering. The React ThemeProvider re-reads the same sources, so its
      initial state matches what this script painted.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('balances.theme')
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia &&
                  window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : 'dark'
          if (theme === 'dark') document.documentElement.classList.add('dark')
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
