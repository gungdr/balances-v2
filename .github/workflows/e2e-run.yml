# Reusable E2E runner (issue #70). Called by e2e.yml for both the per-PR smoke
# gate and the nightly full suite — the only difference is the `grep` input, so
# the heavy setup (Postgres service + Go + Node + Playwright) lives here once.
#
# Self-contained, no secrets: a `services: postgres` stands in for the dev
# Docker container, and `cmd/balances mock-oidc` replaces Google OAuth (ADR-0024),
# so nothing here contacts Neon, Resend, or accounts.google.com.
name: E2E run

on:
  workflow_call:
    inputs:
      tier:
        description: smoke | full — label only, drives the job/artifact name
        type: string
        required: true
      grep:
        description: Playwright args forwarded via E2E_ARGS (e.g. --grep @smoke)
        type: string
        required: false
        default: ''

permissions:
  contents: read

jobs:
  e2e:
    name: ${{ inputs.tier }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: balances
          POSTGRES_PASSWORD: balances
          # Pre-creates the e2e DB so the Makefile's docker-exec db-create
          # (e2e-db-create) is unnecessary — e2e-ci skips it.
          POSTGRES_DB: balances_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U balances"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # The Makefile derives E2E_DATABASE_URL by swapping /balances? -> /balances_e2e?,
      # so this base URL only needs the right host/creds; the base DB itself is
      # never connected to.
      DATABASE_URL: postgres://balances:balances@localhost:5432/balances?sslmode=disable
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run E2E (${{ inputs.tier }})
        # CI=true flips Playwright into forbidOnly + retries=1 + the github
        # reporter (annotates failures inline on the PR). e2e-ci seeds the DB,
        # launches mock-oidc, and lets Playwright boot the backend + vite.
        env:
          CI: 'true'
        run: make e2e-ci E2E_ARGS="${{ inputs.grep }}"
      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-traces-${{ inputs.tier }}
          path: frontend/test-results/
          retention-days: 7
