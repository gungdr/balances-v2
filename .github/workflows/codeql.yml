name: CodeQL

# Static application security testing (SAST). Runs GitHub's CodeQL analysers
# over the Go backend and the TS/JS frontend, surfacing findings in the
# Security tab and as PR annotations. Free for public repositories.
#
# Separate workflow (not folded into ci.yml) because CodeQL needs its own
# permissions block (security-events: write) and a weekly scheduled run so the
# query packs catch newly-published rules against unchanged code.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Monday 06:00 UTC — re-scan against updated query packs even when
    # no code changed.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload results to the code-scanning dashboard.
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # Go is a compiled language: CodeQL traces the build to find source.
      # We build manually so the module in backend/ resolves correctly rather
      # than relying on autobuild guessing the subdirectory.
      - if: matrix.language == 'go'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - if: matrix.language == 'go'
        name: Build backend
        working-directory: backend
        run: go build ./...

      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: "/language:${{ matrix.language }}"
