name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Every job runs on every PR — no path-gating. Codecov needs both the backend
# and frontend flags uploaded on every commit to report an accurate combined
# total; gating skipped one side and left Codecov carrying forward stale (or
# zero) coverage for the untouched half. Actions are free on this public repo,
# so always running both suites is the deterministic, no-cost guarantee.

jobs:
  backend-lint:
    name: Backend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: v2.12.2
          working-directory: backend
          # Don't reuse golangci-lint's analysis cache across runs. Incremental
          # reanalysis mixes stale cross-file staticcheck facts with fresh
          # results, which surfaced as phantom SA5011 (possible-nil-deref) reports
          # on an arbitrary subset of identical `c := findCookie(); if c == nil {
          # t.Fatal }; c.Value` test patterns — flagged in three files while the
          # byte-identical pattern in session_test.go went unreported, and never
          # reproducible on a clean local cache. A full recompute (~40s here) is
          # cheap insurance against these false positives.
          skip-cache: true

  backend-test:
    name: Backend test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      # fetch-depth: 0 — Codecov needs full history to resolve a PR's merge-base
      # commit. With the default shallow (depth-1) clone it can't, leaving the
      # comparison base unresolved ("missing a commit for that pull request") so
      # no PR coverage comment is posted. Only the coverage-uploading jobs
      # (this one + Frontend checks) need it.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Run tests with coverage
        run: go test ./... -race -coverprofile=coverage.out -covermode=atomic
      # Go profiles carry module-qualified paths
      # (github.com/kerti/balances-v2/backend/...). The pip codecov-cli
      # (use_pypi) doesn't strip the module prefix the way the old binary
      # uploader did, so codecov.yml's flag paths + ignore globs (backend/…)
      # matched nothing and the backend flag reported 0%. Rewrite to
      # repo-relative paths before upload.
      - name: Normalise coverage paths for Codecov
        run: sed -i 's#github.com/kerti/balances-v2/##g' coverage.out
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage.out
          flags: backend
          fail_ci_if_error: true
          use_pypi: true

  qa-matrix:
    name: QA invariant matrix
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      # Strict gate: fail if any catalogued invariant lacks per-PR coverage —
      # uncovered, or covered only by a nightly (non-smoke) Playwright spec this
      # PR's gate doesn't run. -report so the read-only check never rewrites the
      # committed coverage files. See docs/qa/how-it-works.md.
      - name: Strict coverage gate
        run: go run ./tools/qa-matrix -report -strict

  gen-ts-types:
    name: Generated TS types freshness
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      # Fails if frontend/src/api/generated.types.ts doesn't match what the
      # Go source would produce — a changed nullability or an added/removed
      # column on a wire-facing struct without a matching regen. See
      # backend/tools/gen-ts-types and issue #365.
      - name: Check generated.types.ts is up to date
        run: go run ./tools/gen-ts-types -check

  backend-vuln:
    name: Backend vuln scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      # Official Go vuln scanner. Reachability-based: only fails on
      # vulnerabilities our code actually calls, not every transitive CVE.
      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      # fetch-depth: 0 — full history for Codecov merge-base resolution (see the
      # Backend test job for the rationale).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm run build
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: true
          use_pypi: true
