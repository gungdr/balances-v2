name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared: &shared
              - '.github/workflows/ci.yml'
              - 'Makefile'
              - 'codecov.yml'
              - '.golangci.yml'
            backend:
              - *shared
              - 'backend/**'
            frontend:
              - *shared
              - 'frontend/**'

  backend-lint:
    name: Backend lint
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: backend

  backend-test:
    name: Backend test
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Run tests with coverage
        run: go test ./... -race -coverprofile=coverage.out -covermode=atomic
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage.out
          flags: backend
          fail_ci_if_error: true

  frontend-checks:
    name: Frontend checks
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm run build
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: true

  # Single aggregator so branch protection can require one stable check even
  # though the jobs above are path-gated (a skipped required job blocks merges;
  # skipped != success). Passes when every dependency is success-or-skipped.
  ci-gate:
    name: CI gate
    if: always()
    needs: [changes, backend-lint, backend-test, frontend-checks]
    runs-on: ubuntu-latest
    steps:
      - name: Verify no required job failed
        run: |
          for r in \
            "${{ needs.changes.result }}" \
            "${{ needs.backend-lint.result }}" \
            "${{ needs.backend-test.result }}" \
            "${{ needs.frontend-checks.result }}"; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              echo "A required job did not pass (result: $r)"
              exit 1
            fi
          done
          echo "All required jobs passed or were skipped."
