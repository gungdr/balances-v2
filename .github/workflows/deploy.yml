# Tag-driven deploy (ADR-0029/0030). A SemVer tag routes to an environment and a
# single `flyctl deploy` builds the image (SPA + Go binary) and rolls it out;
# `goose up` runs inside Fly as the release_command. Single-origin: the Go app
# serves the SPA, so there is no separate frontend deploy.
#
#   v0.6.0-alpha.N -> preview     (auto)
#   v0.6.0-rc.N    -> demo        (auto, once demo exists)
#   v0.6.0         -> production  (GitHub Environment can require manual approval)
name: deploy
on:
  push:
    tags: ['v*']

jobs:
  route:
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.pick.outputs.env }}
    steps:
      - id: pick
        run: |
          t='${{ github.ref_name }}'
          if   [[ "$t" == *-alpha.* ]]; then echo "env=preview" >> "$GITHUB_OUTPUT"
          elif [[ "$t" == *-rc.* || "$t" == *-beta.* ]]; then echo "env=demo" >> "$GITHUB_OUTPUT"
          elif [[ "$t" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then echo "env=production" >> "$GITHUB_OUTPUT"
          else echo "::error::tag $t matches no environment"; exit 1; fi

  deploy:
    needs: route
    runs-on: ubuntu-latest
    environment: ${{ needs.route.outputs.env }}   # secrets + (production) approval gate
    concurrency: deploy-${{ needs.route.outputs.env }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master-pinned 2026-06-13
      - name: Deploy to ${{ needs.route.outputs.env }}
        # APP_VERSION/DEPLOY_ENV are baked into the SPA bundle for the footer
        # (issue #75); the Dockerfile web stage reads them as VITE_ vars.
        run: |
          flyctl deploy --app "balances-${{ needs.route.outputs.env }}" --remote-only \
            --build-arg APP_VERSION="${{ github.ref_name }}" \
            --build-arg DEPLOY_ENV="${{ needs.route.outputs.env }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # Self-host artifact (#225, ADR-0033). Fly builds on its own remote builder and
  # pushes nothing public, so the operator `docker compose pull` contract has no
  # source. This job builds the same Dockerfile and pushes it to GHCR, named for
  # the product (`balances`, not the `-v2` repo) so the operator-facing image is
  # clean. Independent of the Fly deploy — runs in parallel, off the same tag.
  # NOTE one-time setup: the GHCR package visibility must be flipped to public
  # (Packages -> balances -> Package settings -> Change visibility) so the image
  # is anonymously pullable; GITHUB_TOKEN cannot set that.
  ghcr:
    needs: route
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ghcr.io/kerti/balances:${{ github.ref_name }}
          # Kept in lockstep with the Fly build args above so the published
          # artifact bakes the same version/env identity into the SPA bundle.
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            DEPLOY_ENV=${{ needs.route.outputs.env }}
