# Auto-generated release-notes config — used by the GitHub "Generate release notes" button
# and `gh release create --generate-notes`. Groups merged PRs by label into a terse digest.
# See ADR-0029 (release strategy). Issues + PRs are the system of record; this rolls them up.
changelog:
  exclude:
    labels:
      - duplicate
      - invalid
      - wontfix
      - question
  categories:
    - title: ✨ Added
      labels: [enhancement]
    - title: 🐛 Fixed
      labels: [bug]
    - title: 📝 Documentation
      labels: [documentation]
    - title: ⬆️ Dependencies
      labels: [dependencies]
    - title: Other Changes
      labels: ["*"]
