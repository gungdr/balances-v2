codecov:
  require_ci_to_pass: true

coverage:
  # Badge colour tiers: red below 70, yellow gradient 70–80, green at/above 80.
  range: "70...80"
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

# Paths excluded from coverage tabulation. These are either generated code
# (sqlc), test-support code that can't sensibly test itself, or thin
# entrypoint glue covered only by integration. Local `go test -cover` is
# unaffected — only the reported Codecov metric.
ignore:
  - "backend/internal/db/**"
  - "backend/internal/testutil/**"
  - "backend/cmd/balances/**"
  - "backend/internal/migrations/**"

# Both flags upload on every commit (CI runs both suites unconditionally), so
# carryforward is off: the report reflects only what was actually uploaded this
# commit, never stale data carried from an ancestor. A broken upload fails CI
# via fail_ci_if_error rather than being silently backfilled.
flags:
  backend:
    paths:
      - backend/
    carryforward: false
  frontend:
    paths:
      - frontend/
    carryforward: false

comment:
  layout: "header, diff, flags, files"
  behavior: default
