# Operator-facing self-host stack (ADR-0037, #227). Pull-based: the app is the
# published image (ghcr.io/kerti/balances:<tag>), never built here. A bare
# `docker compose up` boots Postgres, runs migrations once, then starts the app
# on http://localhost:${APP_PORT:-8080}. Copy .env.example to .env first.
#
# Dev scaffolding (postgres + mailpit for a host-run backend) lives in
# docker-compose.dev.yml — `make up`.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-balances}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-balances}
      POSTGRES_DB: ${POSTGRES_DB:-balances}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-balances}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot: apply pending migrations, then exit 0. The app waits on this
  # completing successfully, so a failed migration leaves a clearly-failed
  # `migrate` container and the app never starts half-migrated (ADR-0037 — the
  # compose equivalent of Fly's release_command). DATABASE_URL is injected here
  # (host = the `postgres` service) so the operator never hand-writes it.
  migrate:
    image: ghcr.io/kerti/balances:${BALANCES_TAG:-latest}
    command: ["migrate", "up"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-balances}:${POSTGRES_PASSWORD:-balances}@postgres:5432/${POSTGRES_DB:-balances}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    image: ghcr.io/kerti/balances:${BALANCES_TAG:-latest}
    command: ["serve"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-balances}:${POSTGRES_PASSWORD:-balances}@postgres:5432/${POSTGRES_DB:-balances}?sslmode=disable
      # Serve the SPA bundle baked into the image alongside /api (single origin).
      WEB_DIR: /app/web
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # Optional local mail sink for trials. Off by default; bring it up with
  # `docker compose --profile mail up` and set EMAIL_ENABLED=true + SMTP_HOST=mailpit.
  mailpit:
    image: axllent/mailpit:latest
    profiles: ["mail"]
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_HTTP_PORT:-8025}:8025"

  # Optional bundled TLS (ADR-0037). Off by default; bring it up with
  # `docker compose --profile proxy up`. Caddy obtains a Let's Encrypt cert for
  # CADDY_DOMAIN and reverse-proxies to the app (which stays plain http). Set
  # APP_URL=https://<domain> + COOKIE_SECURE=true alongside it. Ports 80+443 must
  # be reachable from the internet for the ACME challenge. caddy_data persists
  # the issued certs across restarts (avoids Let's Encrypt rate limits).
  caddy:
    image: caddy:2-alpine
    profiles: ["proxy"]
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
